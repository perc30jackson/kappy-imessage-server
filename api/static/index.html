<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kappy — iMessage Fleet</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2f3d;
      --text: #e8eaef;
      --muted: #8b92a5;
      --accent: #5b8def;
      --ok: #3ecf8e;
      --warn: #f5a623;
      --err: #ef5b5b;
      --radius: 10px;
      font-family: "SF Pro Text", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
    }
    header {
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }
    header h1 { margin: 0; font-size: 1.25rem; font-weight: 600; }
    .badge {
      font-size: 0.75rem;
      padding: 0.2rem 0.55rem;
      border-radius: 999px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
    }
    main { max-width: 1100px; margin: 0 auto; padding: 1.5rem; }
    .grid { display: grid; gap: 1rem; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.1rem;
    }
    .card h2 { margin: 0 0 0.75rem; font-size: 0.95rem; font-weight: 600; }
    label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 0.25rem; }
    input, select, textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: 0.5rem 0.65rem;
      margin-bottom: 0.65rem;
      font-size: 0.9rem;
    }
    textarea { min-height: 4rem; resize: vertical; }
    .row { display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; }
    button {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 0.45rem 0.85rem;
      font-size: 0.85rem;
      cursor: pointer;
      font-weight: 500;
    }
    button:hover { filter: brightness(1.08); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    button.secondary { background: transparent; border: 1px solid var(--border); color: var(--text); }
    button.danger { background: var(--err); }
    .line-card { border-left: 3px solid var(--border); }
    .line-card.online { border-left-color: var(--ok); }
    .line-card.offline { border-left-color: var(--warn); }
    .line-card.not_activated { border-left-color: var(--muted); }
    .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 0.35rem; }
    .online .status-dot { background: var(--ok); }
    .offline .status-dot { background: var(--warn); }
    .not_activated .status-dot { background: var(--muted); }
    .meta { font-size: 0.8rem; color: var(--muted); }
    .files span { margin-right: 0.5rem; }
    .files .yes { color: var(--ok); }
    .files .no { color: var(--err); }
    #log {
      background: #0a0c10;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.75rem;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.78rem;
      max-height: 220px;
      overflow-y: auto;
      white-space: pre-wrap;
      color: var(--muted);
    }
    #log .ok { color: var(--ok); }
    #log .err { color: var(--err); }
    .messages { max-height: 280px; overflow-y: auto; }
    .msg {
      padding: 0.5rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.85rem;
    }
    .msg:last-child { border-bottom: none; }
    .msg .from { color: var(--accent); font-weight: 500; }
    .checkbox { display: flex; align-items: center; gap: 0.4rem; margin-bottom: 0.65rem; font-size: 0.85rem; }
    .checkbox input { width: auto; margin: 0; }
    .section-title { margin: 1.5rem 0 0.75rem; font-size: 0.85rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
  </style>
</head>
<body>
  <header>
    <h1>Kappy iMessage Fleet</h1>
    <div class="row">
      <span class="badge" id="health-badge">checking…</span>
      <button class="secondary" type="button" id="refresh-btn">Refresh</button>
    </div>
  </header>
  <main>
    <div class="card" style="margin-bottom: 1rem;">
      <h2>Settings</h2>
      <div class="grid">
        <div>
          <label for="api-token">API bearer token (from poc/lines.toml)</label>
          <input id="api-token" type="password" placeholder="leave empty if token is change-me-in-production" autocomplete="off" />
        </div>
        <div>
          <label for="active-line">Active line</label>
          <select id="active-line"><option value="1">Line 1</option></select>
        </div>
      </div>
    </div>

    <p class="section-title">Fleet status</p>
    <div class="grid" id="lines-grid"></div>

    <p class="section-title">Actions — line <span id="line-label">1</span></p>
    <div class="grid">
      <div class="card">
        <h2>Apple ID login</h2>
        <label for="apple-id">Apple ID</label>
        <input id="apple-id" type="email" placeholder="user@example.com" autocomplete="username" />
        <label for="password">Password</label>
        <input id="password" type="password" autocomplete="current-password" />
        <label for="two-fa">2FA code (if prompted)</label>
        <input id="two-fa" type="text" inputmode="numeric" placeholder="123456" />
        <div class="row">
          <button type="button" id="login-btn">Login</button>
          <button type="button" class="secondary" id="activate-btn">Activate</button>
        </div>
      </div>

      <div class="card">
        <h2>Registration &amp; validation</h2>
        <div class="checkbox">
          <input type="checkbox" id="capture-check" />
          <label for="capture-check" style="margin:0">Allow lldb capture (toggle iMessage in Messages)</label>
        </div>
        <div class="row">
          <button type="button" id="register-btn">Register</button>
          <button type="button" class="secondary" id="refresh-val-btn">Refresh validation</button>
          <button type="button" class="secondary" id="capture-btn">Capture only</button>
        </div>
        <div class="row" style="margin-top:0.5rem">
          <button type="button" class="danger" id="recover-btn">Full recover auth</button>
          <button type="button" class="secondary" id="doctor-btn">Doctor</button>
        </div>
      </div>

      <div class="card">
        <h2>Send message</h2>
        <label for="send-to">To (email or phone)</label>
        <input id="send-to" type="text" placeholder="tel:+1… or mailto:…" />
        <label for="send-body">Message</label>
        <textarea id="send-body" placeholder="Hello from Kappy"></textarea>
        <button type="button" id="send-btn">Send</button>
      </div>
    </div>

    <p class="section-title">Inbox</p>
    <div class="card messages" id="messages"></div>

    <p class="section-title">Activity log</p>
    <div id="log"></div>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const tokenKey = "kappy_api_token";

    function log(msg, kind = "") {
      const el = $("log");
      const line = document.createElement("div");
      if (kind) line.className = kind;
      line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
      el.prepend(line);
    }

    function headers() {
      const h = { "Content-Type": "application/json" };
      const t = $("api-token").value.trim();
      if (t) h["Authorization"] = `Bearer ${t}`;
      return h;
    }

    async function api(path, opts = {}) {
      const res = await fetch(path, { ...opts, headers: { ...headers(), ...(opts.headers || {}) } });
      const text = await res.text();
      let data;
      try { data = text ? JSON.parse(text) : {}; } catch { data = { raw: text }; }
      if (!res.ok) throw new Error(data.error || data.raw || res.statusText);
      return data;
    }

    function fileIcon(ok) {
      return `<span class="${ok ? "yes" : "no"}">${ok ? "✓" : "✗"}</span>`;
    }

    function renderLine(line) {
      const conn = line.connection || "offline";
      const files = line.files || {};
      const val = line.validation_seconds_remaining != null
        ? `${line.validation_seconds_remaining}s left`
        : "no validation";
      return `
        <div class="card line-card ${conn}" data-line="${line.id}">
          <h2><span class="status-dot"></span>Line ${line.id} — ${line.label || ""}</h2>
          <div class="meta">${conn.replace("_", " ")} · ${val}</div>
          <div class="meta files" style="margin-top:0.5rem">
            hw ${fileIcon(files.hw_info)}
            id ${fileIcon(files.id_plist)}
            gsa ${fileIcon(files.gsa)}
            key ${fileIcon(files.keystore)}
            val ${fileIcon(files.validation)}
          </div>
          ${line.handles?.length ? `<div class="meta" style="margin-top:0.35rem">handles: ${line.handles.join(", ")}</div>` : ""}
        </div>`;
    }

    async function refreshLines() {
      try {
        const health = await fetch("/health").then(r => r.json());
        $("health-badge").textContent = `v${health.version} · ${health.lines_online}/${health.lines_total} online`;
        const lines = await api("/v1/lines");
        $("lines-grid").innerHTML = lines.map(renderLine).join("");
        const sel = $("active-line");
        const cur = sel.value;
        sel.innerHTML = lines.map(l => `<option value="${l.id}">Line ${l.id} — ${l.label}</option>`).join("");
        if (lines.some(l => l.id === cur)) sel.value = cur;
        $("line-label").textContent = sel.value;
      } catch (e) {
        log(e.message, "err");
        $("health-badge").textContent = "offline";
      }
    }

    async function refreshMessages() {
      const id = $("active-line").value;
      try {
        const msgs = await api(`/v1/lines/${id}/messages?limit=30`);
        const box = $("messages");
        if (!msgs.length) {
          box.innerHTML = '<div class="meta">No messages yet — line must be online.</div>';
          return;
        }
        box.innerHTML = msgs.map(m => `
          <div class="msg">
            <div><span class="from">${m.sender || "unknown"}</span> · ${new Date(m.received_at).toLocaleString()}</div>
            <div>${(m.body || "").replace(/</g, "&lt;")}</div>
          </div>`).join("");
      } catch (e) {
        $("messages").innerHTML = `<div class="meta">${e.message}</div>`;
      }
    }

    function lineId() { return $("active-line").value; }

    async function runAction(label, path, body) {
      const btn = event?.target;
      if (btn?.tagName === "BUTTON") btn.disabled = true;
      log(`${label}…`);
      try {
        const data = await api(path, { method: "POST", body: body ? JSON.stringify(body) : undefined });
        log(`${label}: ${data.message || "OK"}`, "ok");
        await refreshLines();
        await refreshMessages();
      } catch (e) {
        log(`${label} failed: ${e.message}`, "err");
      } finally {
        if (btn?.tagName === "BUTTON") btn.disabled = false;
      }
    }

    $("api-token").value = localStorage.getItem(tokenKey) || "";
    $("api-token").addEventListener("change", () => {
      localStorage.setItem(tokenKey, $("api-token").value.trim());
    });

    $("active-line").addEventListener("change", () => {
      $("line-label").textContent = $("active-line").value;
      refreshMessages();
    });

    $("refresh-btn").addEventListener("click", () => { refreshLines(); refreshMessages(); });

    $("login-btn").addEventListener("click", () => runAction("Login", `/v1/lines/${lineId()}/lifecycle/login`, {
      apple_id: $("apple-id").value.trim(),
      password: $("password").value,
      two_fa_code: $("two-fa").value.trim() || null,
    }));

    $("activate-btn").addEventListener("click", () =>
      runAction("Activate", `/v1/lines/${lineId()}/lifecycle/activate`));

    $("register-btn").addEventListener("click", () =>
      runAction("Register", `/v1/lines/${lineId()}/lifecycle/register`));

    $("refresh-val-btn").addEventListener("click", () =>
      runAction("Refresh validation", `/v1/lines/${lineId()}/lifecycle/refresh-validation`));

    $("capture-btn").addEventListener("click", () => {
      if (!confirm("lldb capture may take several minutes. Toggle iMessage in Messages when prompted. Continue?")) return;
      runAction("Capture validation", `/v1/lines/${lineId()}/lifecycle/capture-validation`);
    });

    $("recover-btn").addEventListener("click", () => {
      const capture = $("capture-check").checked;
      const msg = capture
        ? "Full recover with lldb capture — this can take 5+ minutes."
        : "Full recover (validation → login → register). Continue?";
      if (!confirm(msg)) return;
      runAction("Recover auth", `/v1/lines/${lineId()}/lifecycle/recover-auth`, {
        capture,
        apple_id: $("apple-id").value.trim() || null,
        password: $("password").value || null,
        two_fa_code: $("two-fa").value.trim() || null,
      });
    });

    $("doctor-btn").addEventListener("click", async () => {
      log("Doctor…");
      try {
        const d = await api(`/v1/lines/${lineId()}/doctor`);
        d.details.forEach(line => log(line, d.ok ? "ok" : "err"));
      } catch (e) {
        log(`Doctor failed: ${e.message}`, "err");
      }
    });

    $("send-btn").addEventListener("click", () => runAction("Send", `/v1/lines/${lineId()}/messages`, {
      to: $("send-to").value.trim(),
      body: $("send-body").value,
    }));

    refreshLines();
    refreshMessages();
    setInterval(() => { refreshLines(); refreshMessages(); }, 8000);
  </script>
</body>
</html>
